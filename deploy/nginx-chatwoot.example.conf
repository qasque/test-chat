# Пример для Nginx: HTTPS и прокси на Chatwoot + webhook моста
# Замените chatwoot.example.com и пути к сертификатам (Let's Encrypt / свои).
#
# Порты по умолчанию в docker-compose.yml привязаны к 127.0.0.1:
#   Chatwoot UI — 3000, telegram-bridge — 4000, веб-портал — 18080.
# После выпуска сертификатов обновите FRONTEND_URL в .env и выполните: docker compose up -d
# Подробнее: docs/deployment.md

