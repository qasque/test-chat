server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    location /api/bridge/ {
        proxy_pass http://telegram-bridge:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Явно пробрасываем секрет админки (на случай конфигов nginx, режущих нестандартные заголовки)
        proxy_set_header X-Bridge-Secret $http_x_bridge_secret;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
