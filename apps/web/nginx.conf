server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    location /api/bridge/ {
        proxy_pass http://telegram-bridge:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Bridge-Secret $http_x_bridge_secret;
    }

    location /api/ai-bot/ {
        proxy_pass http://ai-bot:5005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
