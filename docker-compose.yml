# Chatwoot + telegram-bridge stack (based on upstream docker-compose.production.yaml)

name: chatwoot-stack

services:
  base: &base
    image: ghcr.io/qasque/chatwoot-custom:develop
    env_file: .env
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: always

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      # Host 5433 avoids conflict with local PostgreSQL on Windows (default 5432)
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  telegram-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    env_file: .env
    environment:
      CHATWOOT_INTERNAL_URL: http://rails:3000
      BRIDGE_DB_PATH: /data/telegram-threads.json
      BRIDGE_OUTBOUND_QUEUE_PATH: /data/telegram-outbound-queue.json
      BRIDGE_RUNTIME_BOTS_PATH: /data/telegram-bots-runtime.json
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - bridge_data:/data
    depends_on:
      - rails
    restart: always

  # Demo long-poll bot: docker compose --profile demo up -d
  telegram-demo-bot:
    profiles: ["demo"]
    build:
      context: ./telegram-demo-bot
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BRIDGE_URL: http://telegram-bridge:4000
      TELEGRAM_BOT_KEY: ${TELEGRAM_BOT_KEY:-demo_bot}
    depends_on:
      - telegram-bridge
    restart: unless-stopped

  # Web portal; proxies /api/bridge to telegram-bridge
  portal:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:3000}
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - telegram-bridge
    restart: always

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

  ai-bot:
    build:
      context: ./ai-bot
      dockerfile: Dockerfile
    environment:
      CHATWOOT_URL: http://rails:3000
      CHATWOOT_BOT_TOKEN: ${CHATWOOT_BOT_TOKEN:-}
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw:18789}
      OPENCLAW_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-openclaw/default}
      # Многострочный промпт: в .env удобнее файл + volume, либо одна строка с \\n
      AI_BOT_SYSTEM_PROMPT: ${AI_BOT_SYSTEM_PROMPT:-}
      AI_BOT_SYSTEM_PROMPT_FILE: ${AI_BOT_SYSTEM_PROMPT_FILE:-}
    ports:
      - "127.0.0.1:5005:5005"
    depends_on:
      - rails
      - openclaw
    restart: always

volumes:
  storage_data:
  postgres_data:
  redis_data:
  bridge_data:
  openclaw_data:
