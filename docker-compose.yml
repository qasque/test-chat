# Chatwoot + telegram-bridge stack (based on upstream docker-compose.production.yaml)
#
# Rails/Sidekiq: образ собирается из ./chatwoot (клон форка с docker/Dockerfile).
# Первый раз: scripts/clone-chatwoot.sh
# Обновить фронт с git: scripts/update-chatwoot-stack.sh
# Только GHCR без сборки: у rails/sidekiq замените build+image на одну строку image: ghcr.io/...

name: chatwoot-stack

# Общие настройки образа Chatwoot (не отдельный контейнер — иначе compose пытается pull «base»).
x-chatwoot-app: &chatwoot-app
  build:
    context: ./chatwoot
    dockerfile: docker/Dockerfile
    args:
      # При OOM (SIGKILL на vite build) добавьте swap или задайте в .env меньший heap, см. .env.example
      NODE_OPTIONS: "${CHATWOOT_BUILD_NODE_OPTIONS:---max-old-space-size=4096 --openssl-legacy-provider}"
  image: qasque-chatwoot:local
  env_file: .env
  volumes:
    - storage_data:/app/storage

services:
  rails:
    <<: *chatwoot-app
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: always

  sidekiq:
    <<: *chatwoot-app
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      # Host 5433 avoids conflict with local PostgreSQL on Windows (default 5432)
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  telegram-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    env_file: .env
    environment:
      CHATWOOT_INTERNAL_URL: http://rails:3000
      BRIDGE_DB_PATH: /data/telegram-threads.json
      BRIDGE_OUTBOUND_QUEUE_PATH: /data/telegram-outbound-queue.json
      BRIDGE_RUNTIME_BOTS_PATH: /data/telegram-bots-runtime.json
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - bridge_data:/data
    depends_on:
      - rails
    restart: always

  # Demo long-poll bot: docker compose --profile demo up -d
  telegram-demo-bot:
    profiles: ["demo"]
    build:
      context: ./telegram-demo-bot
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BRIDGE_URL: http://telegram-bridge:4000
      TELEGRAM_BOT_KEY: ${TELEGRAM_BOT_KEY:-demo_bot}
    depends_on:
      - telegram-bridge
    restart: unless-stopped

  # Web portal; proxies /api/bridge to telegram-bridge
  portal:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:3000}
      PORTAL_UI_MODE: ${PORTAL_UI_MODE:-full}
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - telegram-bridge
    restart: always

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

  # На NL: docker compose --profile nl-stt up -d stt-groq-relay
  # Groq вызывается с IP NL (обход 403 с РФ). На MSK в ai-bot: STT_GROQ_RELAY_URL=http://IP_NL:8787/openai/v1/audio/transcriptions
  stt-groq-relay:
    profiles: ["nl-stt"]
    build:
      context: ./stt-groq-relay
      dockerfile: Dockerfile
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      RELAY_TOKEN: ${STT_RELAY_TOKEN:-}
    ports:
      - "0.0.0.0:8787:8787"
    restart: unless-stopped

  ai-bot:
    build:
      context: .
      dockerfile: ai-bot/Dockerfile
    volumes:
      - ./config/ai-system-prompt.txt:/app/config/ai-system-prompt.txt:ro
    environment:
      CHATWOOT_URL: http://rails:3000
      CHATWOOT_BOT_TOKEN: ${CHATWOOT_BOT_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      STT_GROQ_RELAY_URL: ${STT_GROQ_RELAY_URL:-}
      STT_RELAY_TOKEN: ${STT_RELAY_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw:18789}
      OPENCLAW_STT_URL: ${OPENCLAW_STT_URL:-}
      OPENCLAW_STT_TOKEN: ${OPENCLAW_STT_TOKEN:-}
      OPENCLAW_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-openclaw/default}
      # Промпт: правьте ./config/ai-system-prompt.txt на хосте (смонтирован ниже). Пустой AI_BOT_SYSTEM_PROMPT в .env.
      AI_BOT_SYSTEM_PROMPT: ${AI_BOT_SYSTEM_PROMPT:-}
      AI_BOT_SYSTEM_PROMPT_FILE: /app/config/ai-system-prompt.txt
      # Redis для кросс-воркерной дедупликации webhook. DB 4 чтобы не пересекаться
      # с Chatwoot (использует 0/1/2/3). Если недоступен, ai-bot падает на in-memory.
      REDIS_URL: ${AI_BOT_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/4}
    # Два воркера — безопасный старт под нагрузку. Под возрастающий RPS можно поднять до 4.
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "5005"
      - --workers
      - "2"
    ports:
      - "127.0.0.1:5005:5005"
    depends_on:
      - rails
      - openclaw
      - redis
    restart: always

volumes:
  storage_data:
  postgres_data:
  redis_data:
  bridge_data:
  openclaw_data:
